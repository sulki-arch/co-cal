<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>개인 캘린더</title>
<!-- Firebase SDK (Realtime Database) — v8 UMD, gstatic 공식 CDN -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<!-- Noto Sans KR -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--P:#1a73e8;--PD:#1557b0;--SUN:#e53935;--SAT:#1a73e8;--BD:#f0f0f0;--SH:0 2px 14px rgba(0,0,0,.13)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',sans-serif;background:#f4f6fb;display:flex;justify-content:center}
#root{width:100%;max-width:480px;min-height:100vh;background:#fff;position:relative;display:flex;flex-direction:column}

/* ── LOGIN (legacy, unused) ── */
#login-screen{display:none}

/* ── APP ── */
#app{display:none;flex-direction:column;flex:1}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--BD);background:#fff;position:sticky;top:0;z-index:100}
.hbtn{background:none;border:none;cursor:pointer;padding:8px;border-radius:50%;color:#555;display:flex;align-items:center;transition:background .15s}
.hbtn:active{background:#f0f0f0}
.h-center{display:flex;flex-direction:column;align-items:center}
.mnav{display:flex;align-items:center;gap:0}
.mnav button{background:none;border:none;cursor:pointer;font-size:22px;color:#444;padding:2px 8px;border-radius:8px;line-height:1;transition:background .15s}
.mnav button:active{background:#f0f0f0}
.hmonth{font-size:18px;font-weight:700;color:#1a1a1a;min-width:126px;text-align:center}
.h-sub{font-size:11px;color:#bbb;margin-top:2px}

/* ── CATEGORY FILTER BAR ── */
.cat-bar{display:flex;align-items:center;gap:7px;padding:8px 12px;overflow-x:auto;border-bottom:1px solid var(--BD);background:#fff;scrollbar-width:none}
.cat-bar::-webkit-scrollbar{display:none}
.c-chip{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;border:1.5px solid #e0e0e0;color:#aaa;background:#f5f5f5;transition:all .15s;flex-shrink:0}
.c-chip.active{color:#333}
.c-chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── SEARCH BAR ── */
.sbar{padding:10px 14px;border-bottom:1px solid var(--BD);display:none;background:#fff}
.sbar.open{display:block}
.sbar input{width:100%;padding:10px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:14px;outline:none;font-family:inherit}
.sbar input:focus{border-color:var(--P)}
.sres{margin-top:6px}
.sres-item{display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px solid var(--BD);cursor:pointer}
.sres-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sres-empty{font-size:13px;color:#bbb;padding:14px 0;text-align:center}

/* ── CALENDAR ── */
.cal{flex:1}
.dhdr{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--BD)}
.dh{text-align:center;padding:7px 0;font-size:12px;font-weight:600;color:#888}
.dh:first-child{color:var(--SUN)}.dh:last-child{color:var(--SAT)}
.cgrid{display:flex;flex-direction:column}

.dc{min-height:82px;border-right:1px solid #f2f2f2;border-bottom:1px solid #f2f2f2;padding:3px 2px 2px;cursor:pointer;overflow:hidden;transition:background .1s;min-width:0}
.dc:hover{background:#f8faff}
.cal-days .dc:nth-child(7n){border-right:none}
.dnum{font-size:13px;font-weight:500;width:26px;height:26px;display:flex;align-items:center;justify-content:center;margin:0 auto 2px;border-radius:50%}
.dc.today .dnum{background:var(--P);color:#fff;font-weight:700}
.dc.sun .dnum{color:var(--SUN)}.dc.sat .dnum{color:var(--SAT)}
.dc.today.sun .dnum,.dc.today.sat .dnum{color:#fff}
.dc.other .dnum{color:#ccc}.dc.other{background:#fafafa}

/* ── EVENT PILLS ── */
.ep{display:block;width:100%;font-size:10px;padding:1px 4px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;line-height:17px;font-weight:500}
.ep:active{opacity:.75}
.ep-more{font-size:10px;color:#aaa;padding-left:3px;cursor:pointer}
.ep.ep-grp{border-left:3px solid rgba(255,167,38,.8)}

/* ── SCOPE FILTER BAR ── */
.scope-bar{display:flex;align-items:center;gap:7px;padding:5px 12px;overflow-x:auto;border-bottom:1px solid var(--BD);background:#fffef5;scrollbar-width:none}
.scope-bar::-webkit-scrollbar{display:none}
.scope-label{font-size:10px;font-weight:700;color:#ccc;white-space:nowrap;flex-shrink:0;letter-spacing:.3px}
.sc-chip{display:flex;align-items:center;gap:5px;padding:4px 11px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;border:1.5px solid #e0e0e0;color:#bbb;background:#f5f5f5;transition:all .15s;flex-shrink:0}
.sc-chip.on-all{background:#e8f5e9;border-color:#66bb6a;color:#2e7d32}
.sc-chip.on-grp{background:#fff3e0;border-color:#ffa726;color:#e65100}
.sc-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ── CELL MEDIA ROW ── */
.cmedia{display:flex;align-items:center;gap:2px;padding:0 3px;min-height:16px;flex-wrap:nowrap;overflow:hidden}
.cm-stk{font-size:12px;line-height:1}
.cm-photo{font-size:10px;color:#888;display:flex;align-items:center;gap:2px;font-weight:600}

/* ── COLOR CLASSES ── */
.c-red   {background:#ffcdd2;color:#b71c1c}
.c-blue  {background:#bbdefb;color:#0d47a1}
.c-green {background:#c8e6c9;color:#1b5e20}
.c-yellow{background:#fff9c4;color:#827717}
.c-purple{background:#e1bee7;color:#4a148c}
.c-orange{background:#ffe0b2;color:#bf360c}
.c-teal  {background:#b2dfdb;color:#004d40}
.c-pink  {background:#f8bbd0;color:#880e4f}
.c-gray  {background:#eeeeee;color:#424242}

/* ── FAB ── */
.fab{position:fixed;bottom:24px;width:54px;height:54px;background:var(--P);color:#fff;border:none;border-radius:50%;font-size:26px;cursor:pointer;box-shadow:0 4px 16px rgba(26,115,232,.45);display:flex;align-items:center;justify-content:center;z-index:50;transition:background .2s,transform .15s}
.fab:active{background:var(--PD);transform:scale(.94)}

/* ── OVERLAY + DRAWER ── */
.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:200}
.drawer{position:fixed;top:0;left:-295px;width:295px;height:100%;background:#fff;z-index:201;transition:left .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:var(--SH)}
.drawer.open{left:0}
.d-head{padding:36px 20px 18px;background:var(--P)}
.d-av{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:10px}
.d-name{font-size:17px;font-weight:700;color:#fff}
.d-role{font-size:12px;color:rgba(255,255,255,.72);margin-top:3px}
.d-menu{padding:6px 0;flex:1;overflow-y:auto}
.d-item{display:flex;align-items:center;gap:14px;padding:14px 20px;cursor:pointer;font-size:15px;color:#333;border:none;background:none;width:100%;text-align:left;transition:background .15s}
.d-item:hover{background:#f5f8ff}
.d-div{height:1px;background:var(--BD);margin:4px 0}

/* ── BOTTOM SHEET ── */
.bso{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;align-items:flex-end;justify-content:center}
.bso.open{display:flex}
.bs{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:14px 20px 32px;max-height:90vh;overflow-y:auto;animation:su .22s cubic-bezier(.4,0,.2,1)}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.bs-h{width:38px;height:4px;background:#e0e0e0;border-radius:2px;margin:0 auto 16px}
.bs-t{font-size:18px;font-weight:700;color:#1a1a1a;margin-bottom:16px}
label.fl{display:block;font-size:12px;font-weight:600;color:#666;margin:14px 0 5px}
.bs input,.bs select,.bs textarea{width:100%;padding:12px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:15px;outline:none;color:#222;font-family:inherit;background:#fff;transition:border-color .2s}
.bs input:focus,.bs select:focus,.bs textarea:focus{border-color:var(--P)}
.bs-acts{display:flex;gap:10px;margin-top:18px}
.btn{padding:13px 14px;border-radius:12px;font-size:15px;font-weight:700;border:none;cursor:pointer;flex:1;font-family:inherit;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-p{background:var(--P);color:#fff}
.btn-d{background:#ffebee;color:#c62828}
.btn-s{background:#f5f5f5;color:#555}
.ferr{color:#e53935;font-size:12px;margin-top:6px;min-height:16px}

/* ── COLOR PICKER (categories / events) ── */
.cpick{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.copt{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:border-color .15s,transform .15s}
.copt.sel{border-color:#333;transform:scale(1.14)}

/* ── DAY DETAIL ── */
.dd-sec{font-size:11px;font-weight:700;color:#aaa;letter-spacing:.5px;text-transform:uppercase;margin:14px 0 8px}
.dd-ev{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--BD);cursor:pointer}
.dd-ev:active{background:#f9f9f9}
.dd-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dd-info{flex:1}
.dd-ttl{font-size:15px;color:#1a1a1a;font-weight:500}
.dd-time{font-size:12px;color:#999;margin-top:2px}
.dd-empty{text-align:center;color:#ccc;padding:20px 0;font-size:13px}
.dd-btns{display:flex;gap:8px;margin-top:14px}

/* ── STICKER ROW (day detail) ── */
.stk-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.stk-item{position:relative;display:inline-flex;align-items:center;justify-content:center;font-size:24px;width:44px;height:44px;border-radius:10px;background:#f7f7f7;cursor:pointer;border:1.5px solid transparent;transition:border-color .15s}
.stk-item:hover{border-color:#e0e0e0}
.stk-del{position:absolute;top:-6px;right:-6px;width:17px;height:17px;border-radius:50%;background:#e53935;color:#fff;border:none;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;line-height:1}

/* ── PHOTO GRID (day detail) ── */
.photo-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.photo-wrap{position:relative;border-radius:10px;overflow:hidden;aspect-ratio:1}
.photo-wrap img{width:100%;height:100%;object-fit:cover;cursor:pointer;display:block}
.photo-del{position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;border:none;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
.photo-cover-btn{position:absolute;bottom:4px;left:4px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.45);color:rgba(255,255,255,.7);border:none;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;line-height:1}
.photo-cover-btn.active{background:#f5a623;color:#fff}

/* ── COVER PHOTO CELL ── */
.dc.has-cover{position:relative;background-size:cover;background-position:center top;background-repeat:no-repeat}
.dc.has-cover::before{content:'';position:absolute;inset:0;background:rgba(0,0,0,.3);pointer-events:none;z-index:0}
.dc.has-cover .dnum{position:relative;z-index:1;background:rgba(0,0,0,.38)!important;color:#fff!important}
.dc.has-cover.today .dnum{background:var(--P)!important}
.dc.has-cover .ep{position:relative;z-index:1;background:rgba(0,0,0,.38)!important;color:#fff!important}
.dc.has-cover .ep-more{position:relative;z-index:1;color:rgba(255,255,255,.8)}
.dc.has-cover .cmedia{position:relative;z-index:1}
.dc.has-cover .cm-stk{filter:drop-shadow(0 1px 2px rgba(0,0,0,.7))}
.dc.has-cover .cm-photo{color:rgba(255,255,255,.9);filter:drop-shadow(0 1px 2px rgba(0,0,0,.7))}
.media-add-row{display:flex;gap:8px;margin-top:4px}
.media-add-btn{flex:1;padding:10px;border:1.5px dashed #ddd;background:none;border-radius:10px;font-size:13px;color:#aaa;cursor:pointer;font-family:inherit;transition:all .15s}
.media-add-btn:hover{border-color:var(--P);color:var(--P)}

/* ── STICKER PICKER ── */
.stk-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:8px}
.stk-pick-btn{font-size:26px;background:#f7f7f7;border:none;border-radius:10px;aspect-ratio:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s}
.stk-pick-btn:active{background:#e8e8e8}

/* ── CATEGORY MGMT ── */
.cat-item{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--BD)}
.cat-swatch{width:22px;height:22px;border-radius:50%;flex-shrink:0}
.cat-name{flex:1;font-size:15px;font-weight:600;color:#1a1a1a}
.cat-order-btns{display:flex;gap:2px}
.order-btn{background:#f5f5f5;border:none;border-radius:6px;width:26px;height:26px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:#666;transition:background .12s}
.order-btn:active{background:#e0e0e0}
.cat-edit-btn{background:none;border:none;cursor:pointer;padding:5px;color:#aaa;font-size:16px;border-radius:8px;transition:color .12s}
.cat-edit-btn:hover{color:#555}
.cat-add-btn{width:100%;padding:13px;border:2px dashed #ddd;background:none;border-radius:12px;color:#aaa;font-size:14px;cursor:pointer;margin-top:12px;font-family:inherit;transition:all .2s}
.cat-add-btn:hover{border-color:var(--P);color:var(--P)}

/* ── MEMBER SELECTOR (group edit) ── */
.mem-list{max-height:180px;overflow-y:auto;border:1.5px solid #e0e0e0;border-radius:10px;margin-top:4px}
.mem-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid #f5f5f5;cursor:pointer;transition:background .12s}
.mem-item:last-child{border-bottom:none}
.mem-item:active{background:#f9f9f9}
.mem-chk{width:18px;height:18px;border-radius:5px;border:2px solid #ddd;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;transition:all .15s}
.mem-chk.on{background:var(--P);border-color:var(--P);color:#fff}
.mem-name{font-size:14px;color:#333;font-weight:500}
.mem-id{font-size:11px;color:#aaa;margin-top:1px}
/* scope tag in day detail */
.scope-tag{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600;white-space:nowrap;flex-shrink:0}
.scope-tag.s-all{background:#e8f5e9;color:#2e7d32}
.scope-tag.s-grp{background:#fff3e0;color:#e65100}

/* ── USER MGMT ── */
.u-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--BD)}
.u-name{font-size:15px;font-weight:600;color:#1a1a1a}
.u-id{font-size:12px;color:#999;margin-top:2px}
.ubadge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:700}
.ba{background:#fff3e0;color:#e65100}.bg{background:#e3f2fd;color:#1565c0}
.icon-btn{background:none;border:none;cursor:pointer;padding:6px;color:#aaa;font-size:16px;border-radius:8px;transition:color .15s}
.icon-btn:hover{color:#555}
.u-add-btn{width:100%;padding:13px;border:2px dashed #ddd;background:none;border-radius:12px;color:#aaa;font-size:14px;cursor:pointer;margin-top:12px;font-family:inherit;transition:all .2s}
.u-add-btn:hover{border-color:var(--P);color:var(--P)}

/* ── LIGHTBOX ── */
#lbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:600;align-items:center;justify-content:center}
#lbox.open{display:flex}
#lbox img{max-width:95vw;max-height:90vh;border-radius:10px;object-fit:contain}
#lbox-close{position:absolute;top:16px;right:18px;background:rgba(255,255,255,.18);color:#fff;border:none;font-size:26px;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ── TOAST ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:rgba(30,30,30,.9);color:#fff;padding:10px 22px;border-radius:22px;font-size:14px;opacity:0;transition:all .28s;z-index:950;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── MULTI-DAY EVENT PILL ── */
.ep.ep-cont{opacity:.6;border-left:3px solid currentColor}
.attend-count{font-size:9px;font-weight:700;margin-left:3px;opacity:.85;flex-shrink:0}

/* ── CELL STICKER ROW ── */
.dc-stk-row{display:flex;align-items:center;justify-content:center;gap:1px;line-height:1}
.dc-stk{font-size:13px;width:18px;text-align:center;flex-shrink:0;line-height:1}

/* ── DUAL COVER PHOTO ── */
.dc.has-cover-2{position:relative;background-repeat:no-repeat}
.dc.has-cover-2::before{content:'';position:absolute;inset:0;background:rgba(0,0,0,.3);pointer-events:none;z-index:0}
.dc.has-cover-2 .dc-stk-row,.dc.has-cover-2 .ep,.dc.has-cover-2 .ep-more,.dc.has-cover-2 .cmedia{position:relative;z-index:1}
.dc.has-cover-2 .dnum{position:relative;z-index:1;background:rgba(0,0,0,.38)!important;color:#fff!important}
.dc.has-cover-2 .ep{background:rgba(0,0,0,.38)!important;color:#fff!important}

/* ── VIEW TOGGLE ── */
.view-toggle{display:flex;gap:3px;align-items:center}
.vt-btn{background:none;border:1.5px solid #e0e0e0;border-radius:10px;font-size:11px;font-weight:600;padding:2px 8px;cursor:pointer;color:#aaa;font-family:inherit;transition:all .15s;line-height:1.6}
.vt-btn.active{background:var(--P);border-color:var(--P);color:#fff}

/* ── WEEKLY CALENDAR ── */
#wcalWrap{flex-direction:column;flex:1;overflow:hidden}
.wc-day-hdr{display:grid;grid-template-columns:40px repeat(3,1fr);background:#fff;border-bottom:1px solid var(--BD);flex-shrink:0;position:sticky;top:0;z-index:10}
.wc-dh-cell{text-align:center;padding:5px 1px 4px}
.wc-dh-name{font-size:10px;font-weight:600;color:#888}
.wc-dh-date{font-size:14px;font-weight:700;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin:2px auto 0;color:#333}
.wc-dh-date.wc-today{background:var(--P);color:#fff}
.wc-dh-cell.wc-sun .wc-dh-name,.wc-dh-cell.wc-sun .wc-dh-date:not(.wc-today){color:var(--SUN)}
.wc-dh-cell.wc-sat .wc-dh-name,.wc-dh-cell.wc-sat .wc-dh-date:not(.wc-today){color:var(--SAT)}
.wc-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.wc-inner{position:relative;display:grid;grid-template-columns:40px repeat(3,1fr)}
.wc-time-label{font-size:10px;color:#bbb;text-align:right;padding-right:5px;border-bottom:1px solid #f5f5f5;display:flex;align-items:flex-start;justify-content:flex-end;padding-top:2px}
.wc-hour-cell{border-left:1px solid #f2f2f2;border-bottom:1px solid #f5f5f5}
.wc-hour-cell.wc-today-col{background:rgba(26,115,232,.025)}
.wc-ev{position:absolute;border-radius:5px;font-size:10px;padding:2px 4px;overflow:hidden;cursor:pointer;line-height:1.3;box-sizing:border-box}
.wc-ev-name{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wc-ev-meta{font-size:9px;opacity:.85;margin-top:1px;white-space:normal;overflow:hidden;word-break:break-all}
.wc-allday-bar{display:grid;grid-template-columns:40px repeat(3,1fr);background:#fff8f0;border-bottom:1px solid var(--BD);min-height:20px;flex-shrink:0}
.wc-allday-lbl{font-size:9px;color:#bbb;text-align:right;padding:3px 4px 0}
.wc-allday-cell{border-left:1px solid #f2f2f2;padding:2px 1px;display:flex;flex-direction:column;gap:1px}
.wc-allday-ev{font-size:9px;font-weight:600;border-radius:3px;padding:1px 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.wc-now-line{position:absolute;left:40px;right:0;height:2px;background:rgba(234,67,53,.7);z-index:3;pointer-events:none}
.wc-now-line::before{content:'';position:absolute;left:-4px;top:-4px;width:10px;height:10px;border-radius:50%;background:rgba(234,67,53,.8)}

/* ── EVENT DETAIL MODAL ── */
.ev-date-line{font-size:13px;color:#888;margin-bottom:10px;line-height:1.5}
.ev-tag{font-size:11px;padding:3px 9px;border-radius:10px;font-weight:600}
.ev-tag.t-cat{background:#e3f2fd;color:#1565c0}
.ev-tag.t-all{background:#e8f5e9;color:#2e7d32}
.ev-tag.t-grp{background:#fff3e0;color:#e65100}
.ev-memo-box{font-size:14px;color:#333;line-height:1.65;padding:10px 12px;background:#f8f8f8;border-radius:10px;white-space:pre-wrap;word-break:break-word;margin-bottom:4px}
.btn-attend{background:#e8f5e9;color:#2e7d32;border:1.5px solid #a5d6a7}
.btn-attend.going{background:#2e7d32;color:#fff;border-color:#2e7d32}
.attend-names{font-size:13px;color:#666;line-height:1.8;padding:4px 0 10px}

/* ── CHAT ── */
.chat-area{border:1.5px solid #f0f0f0;border-radius:12px;max-height:220px;overflow-y:auto;padding:6px 0;margin-bottom:10px}
.chat-empty{font-size:13px;color:#bbb;text-align:center;padding:14px 0}
.chat-bubble{padding:7px 14px;border-bottom:1px solid #fafafa}
.chat-bubble:last-child{border-bottom:none}
.chat-mine{background:#f5f9ff}
.chat-nick{font-size:11px;font-weight:700;color:#1a73e8}
.chat-mine .chat-nick{color:#e65100}
.chat-avatar{width:26px;height:26px;border-radius:50%;object-fit:cover;flex-shrink:0;background:#e8e8e8;display:flex;align-items:center;justify-content:center;font-size:13px;overflow:hidden}
.chat-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.chat-hd{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.prof-avatar-wrap{width:80px;height:80px;border-radius:50%;background:#f0f0f0;margin:0 auto 8px;overflow:hidden;cursor:pointer;border:2px solid #e0e0e0;display:flex;align-items:center;justify-content:center;position:relative}
.prof-avatar-wrap img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:none}
.prof-avatar-wrap .pa-icon{font-size:32px}
.ev-memo-box a{color:#1a73e8;text-decoration:underline;word-break:break-all}
.chat-text{font-size:13px;color:#222;margin-top:2px;word-break:break-word;line-height:1.5}
.chat-ts{font-size:10px;color:#ccc;margin-top:3px}
.chat-send-row{display:flex;gap:8px;margin-bottom:4px}
.chat-send-row input{flex:1;padding:10px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:14px;outline:none;font-family:inherit}
.chat-send-row input:focus{border-color:var(--P)}
.chat-send-btn{padding:10px 16px;background:var(--P);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0}

/* ── GUEST BUTTON (스플래시 하단) ── */
.sp-guest-btn{width:100%;padding:12px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.65);border:1.5px solid rgba(255,255,255,.18);border-radius:12px;font-size:14px;cursor:pointer;font-family:inherit;transition:all .2s;margin-top:10px}
.sp-guest-btn:active{background:rgba(255,255,255,.2);color:#fff}

/* ── VIEWER BANNER ── */
.viewer-banner{background:#fff3e0;border-bottom:1px solid #ffcc80;padding:7px 16px;font-size:12px;color:#e65100;text-align:center;font-weight:600;display:none;flex-shrink:0}
.viewer-banner.show{display:block}

/* ── SPLASH SCREEN ── */
#splash{position:fixed;inset:0;z-index:800;display:flex;flex-direction:column;background:#0f2027;background-size:cover;background-position:center;background-repeat:no-repeat;transition:opacity .65s ease}
#splash.fade-out{opacity:0;pointer-events:none}
.sp-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.15) 0%,rgba(0,0,0,.72) 100%)}
/* 1단: 제목 */
.sp-top{flex:1;position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:64px 32px 16px;color:#fff}
.sp-title{font-size:34px;font-weight:800;margin-bottom:0;text-shadow:0 2px 14px rgba(0,0,0,.5);line-height:1.2;letter-spacing:-.5px}
/* 2단: 설명 텍스트 */
.sp-mid{position:relative;z-index:1;text-align:center;padding:0 32px 24px;color:#fff}
.sp-desc{font-size:14px;line-height:1.75;opacity:.85;text-shadow:0 1px 6px rgba(0,0,0,.4);word-break:keep-all}
/* 3단: 로그인 폼 */
.sp-login{position:relative;z-index:1;padding:0 24px 48px;opacity:0;transform:translateY(24px);transition:opacity .55s ease,transform .55s ease;pointer-events:none}
.sp-login.show{opacity:1;transform:translateY(0);pointer-events:auto}
.sp-login input{width:100%;padding:14px 16px;background:rgba(255,255,255,.13);border:1.5px solid rgba(255,255,255,.28);border-radius:12px;font-size:15px;color:#fff;margin-bottom:11px;outline:none;font-family:inherit;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);transition:border-color .2s,background .2s}
.sp-login input::placeholder{color:rgba(255,255,255,.5)}
.sp-login input:focus{border-color:rgba(255,255,255,.65);background:rgba(255,255,255,.21)}
.sp-btn{width:100%;padding:15px;background:rgba(255,255,255,.95);color:#1a1a1a;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s;margin-top:2px}
.sp-btn:active{background:rgba(255,255,255,.78)}
.sp-err{color:rgba(255,185,185,1);font-size:13px;text-align:center;margin-top:10px;min-height:18px}

/* ── SPLASH EDIT MODAL ── */
.sp-preview{width:100%;height:180px;border-radius:14px;background:#0f2027;background-size:cover;background-position:center;overflow:hidden;position:relative;margin-bottom:4px}
.sp-preview-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,rgba(0,0,0,.6) 100%)}
.sp-preview-content{position:absolute;bottom:0;left:0;right:0;padding:14px 16px;color:#fff;text-align:center}
.sp-preview-title{font-size:18px;font-weight:800;text-shadow:0 1px 6px rgba(0,0,0,.4)}
.sp-preview-desc{font-size:12px;opacity:.85;margin-top:4px;text-shadow:0 1px 4px rgba(0,0,0,.4)}
.sp-photo-btn{width:100%;padding:12px;border:1.5px dashed #ddd;background:none;border-radius:10px;font-size:13px;color:#888;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.sp-photo-btn:hover{border-color:var(--P);color:var(--P)}
.char-count{font-size:11px;color:#bbb;text-align:right;margin-top:4px}

@keyframes calSlideUp{from{transform:translateY(28px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes calSlideDown{from{transform:translateY(-28px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes calSlideLeft{from{transform:translateX(28px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes calSlideRight{from{transform:translateX(-28px);opacity:0}to{transform:translateX(0);opacity:1}}
.cal-anim-up{animation:calSlideUp .24s cubic-bezier(.4,0,.2,1)}
.cal-anim-down{animation:calSlideDown .24s cubic-bezier(.4,0,.2,1)}
.cal-anim-left{animation:calSlideLeft .24s cubic-bezier(.4,0,.2,1)}
.cal-anim-right{animation:calSlideRight .24s cubic-bezier(.4,0,.2,1)}
.chat-del-btn{background:none;border:none;cursor:pointer;color:#ddd;font-size:13px;padding:0 2px;margin-left:auto;border-radius:4px;line-height:1;transition:color .12s;flex-shrink:0}
.chat-del-btn:hover{color:#e53935}
.chat-react-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;align-items:center;position:relative}
.chat-react-btn{background:#f5f5f5;border:1.5px solid #e8e8e8;border-radius:20px;cursor:pointer;font-size:12px;padding:2px 7px;display:inline-flex;align-items:center;gap:2px;transition:all .12s;font-family:inherit}
.chat-react-btn.reacted{background:#e8f5e9;border-color:#a5d6a7}
.chat-react-btn .react-cnt{font-size:11px;color:#777}
.chat-react-add{background:#f5f5f5;border:1.5px solid #e8e8e8;border-radius:20px;cursor:pointer;font-size:12px;padding:2px 8px;color:#aaa;transition:all .12s;font-family:inherit}
.chat-react-picker{display:flex;gap:4px;padding:6px 8px;background:#fff;border:1.5px solid #e0e0e0;border-radius:14px;box-shadow:0 3px 12px rgba(0,0,0,.13);position:absolute;z-index:50;bottom:28px;left:0}
.chat-react-picker button{background:none;border:none;font-size:20px;cursor:pointer;border-radius:6px;padding:2px 4px}

.cal-week{}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-md-area{position:relative;overflow:hidden}
.cal-md-bar{position:absolute;height:18px;border-radius:4px;font-size:10px;padding:1px 5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;line-height:16px;font-weight:600;border:1px solid rgba(255,255,255,.3)}
.cal-md-bar:active{opacity:.8}
</style>
</head>
<body>
<div id="root">

<!-- ═══ LOADING SCREEN ═══ -->
<div id="ldg" style="display:none;position:fixed;inset:0;z-index:900;background:#0f2027;flex-direction:column;align-items:center;justify-content:center;gap:14px">
  <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="1.5" style="animation:spin 1.4s linear infinite">
    <circle cx="12" cy="12" r="10" stroke-dasharray="30 60"/>
  </svg>
  <div style="color:rgba(255,255,255,.45);font-size:13px">연결 중...</div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<!-- ═══ SPLASH + LOGIN (3단 구성) ═══ -->
<div id="splash">
  <div class="sp-overlay"></div>
  <!-- 1단: 제목 -->
  <div class="sp-top">
    <div class="sp-title" id="spTitle">개인 캘린더</div>
  </div>
  <!-- 2단: 설명 텍스트 -->
  <div class="sp-mid">
    <div class="sp-desc" id="spDesc"></div>
  </div>
  <!-- 3단: 로그인 폼 (1.5초 후 서서히 등장) -->
  <div class="sp-login" id="spLogin">
    <input id="lu" type="text"     placeholder="아이디"   autocomplete="username">
    <input id="lp" type="password" placeholder="비밀번호" autocomplete="current-password">
    <button class="sp-btn" onclick="doLogin()">로그인</button>
    <div class="sp-err" id="lerr"></div>
    <button class="sp-guest-btn" onclick="doGuestLogin()">👁 게스트로 지켜보기</button>
  </div>
</div>

<!-- login-screen (legacy, hidden) -->
<div id="login-screen"></div>

<!-- ═══ APP ═══ -->
<div id="app">
<div class="viewer-banner" id="viewerBanner">👁 게스트 모드 — 일정 추가/수정/삭제는 로그인 후 이용 가능합니다</div>
  <!-- Header -->
  <div class="hdr">
    <button class="hbtn" onclick="openDrawer()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="h-center">
      <div class="mnav">
        <button onclick="changeMonth(-1)">‹</button>
        <div class="hmonth" id="hmonth">2026년 5월</div>
        <button onclick="changeMonth(1)">›</button>
      </div>
      <div class="h-sub">
        <div class="view-toggle">
          <button class="vt-btn active" id="monthViewBtn" onclick="switchView('month')">월간</button>
          <button class="vt-btn" id="weekViewBtn" onclick="switchView('week')">주간</button>
        </div>
      </div>
    </div>
    <button class="hbtn" onclick="toggleSearch()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </button>
  </div>

  <!-- Category filter bar -->
  <div class="cat-bar" id="catBar"></div>

  <!-- Scope filter bar (shown when groups exist) -->
  <div class="scope-bar" id="scopeBar" style="display:none"></div>

  <!-- Search bar -->
  <div class="sbar" id="sbar">
    <input id="sinput" type="text" placeholder="일정 검색..." oninput="doSearch(this.value)">
    <div id="sres" class="sres"></div>
  </div>

  <!-- Calendar -->
  <div class="cal">
    <div class="dhdr">
      <div class="dh">일</div><div class="dh">월</div><div class="dh">화</div>
      <div class="dh">수</div><div class="dh">목</div><div class="dh">금</div><div class="dh">토</div>
    </div>
    <div class="cgrid" id="cgrid"></div>
  </div>

  <!-- Weekly Calendar -->
  <div id="wcalWrap" style="display:none">
    <div class="wc-day-hdr" id="wcDayHdr"></div>
    <div class="wc-allday-bar" id="wcAlldayBar"></div>
    <div class="wc-scroll" id="wcScroll">
      <div class="wc-inner" id="wcInner"></div>
    </div>
  </div>

  <!-- FAB -->
  <button class="fab" id="fab" onclick="openEvModal(null,null)">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
</div><!-- #app -->

<!-- DRAWER OVERLAY -->
<div class="ovl" id="ovl" onclick="closeDrawer()"></div>

<!-- ═══ DRAWER ═══ -->
<div class="drawer" id="drawer">
  <div class="d-head">
    <div class="d-av">👤</div>
    <div class="d-name" id="dname"></div>
    <div class="d-role" id="drole"></div>
  </div>
  <div class="d-menu">
    <button class="d-item" onclick="goToday();closeDrawer()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      오늘로 이동
    </button>
    <div class="d-div"></div>
    <button class="d-item" id="d-splash" style="display:none" onclick="openSplashEdit();closeDrawer()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      메인 화면 편집
    </button>
    <div class="d-div" id="dsplashdiv" style="display:none"></div>
    <button class="d-item" id="d-profile" style="display:none" onclick="openProfile();closeDrawer()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      내 프로필
    </button>
    <div class="d-div" id="dprodiv" style="display:none"></div>
    <button class="d-item" onclick="openGroupMgmt();closeDrawer()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      그룹 관리
    </button>
    <div class="d-div"></div>
    <button class="d-item" onclick="openCatMgmt();closeDrawer()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
      카테고리 관리
    </button>
    <div class="d-div"></div>
    <button class="d-item" id="d-users" style="display:none" onclick="openUserMgmt();closeDrawer()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      사용자 관리
    </button>
    <div class="d-div" id="dadiv" style="display:none"></div>
    <button class="d-item" onclick="doLogout()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      로그아웃
    </button>
  </div>
</div>

<!-- ═══ EVENT MODAL ═══ -->
<div class="bso" id="evM">
  <div class="bs">
    <div class="bs-h"></div>
    <div class="bs-t" id="evMT">일정 추가</div>
    <label class="fl">제목</label>
    <input id="evTxt" type="text" placeholder="일정 제목">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div><label class="fl">시작 날짜</label><input id="evStartDate" type="date"></div>
      <div><label class="fl">시작 시간 <span style="font-weight:400;color:#bbb">(선택)</span></label><input id="evStartTime" type="time"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div><label class="fl">종료 날짜</label><input id="evEndDate" type="date"></div>
      <div><label class="fl">종료 시간 <span style="font-weight:400;color:#bbb">(선택)</span></label><input id="evEndTime" type="time"></div>
    </div>
    <label class="fl">메모 <span style="font-weight:400;color:#bbb">(선택)</span></label>
    <textarea id="evMemo" placeholder="일정 메모..." style="height:68px;resize:none;line-height:1.6"></textarea>
    <label class="fl">카테고리</label>
    <select id="evCat"></select>
    <label class="fl">공개 범위</label>
    <select id="evScope"></select>
    <div class="bs-acts">
      <button class="btn btn-s" onclick="closeM('evM')">취소</button>
      <button class="btn btn-d" id="evDel" style="display:none" onclick="delEvent()">삭제</button>
      <button class="btn btn-p" onclick="saveEvent()">저장</button>
    </div>
  </div>
</div>

<!-- ═══ DAY DETAIL MODAL ═══ -->
<div class="bso" id="ddM">
  <div class="bs">
    <div class="bs-h"></div>
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:16px">
      <div id="ddStkL" style="font-size:28px;width:34px;text-align:center;flex-shrink:0"></div>
      <div class="bs-t" id="ddT" style="flex:1;margin-bottom:0;text-align:center"></div>
      <div id="ddStkR" style="font-size:28px;width:34px;text-align:center;flex-shrink:0"></div>
    </div>
    <div id="ddEvs"></div>
    <div class="dd-sec">스티커</div>
    <div class="stk-row" id="ddStk"></div>
    <div class="media-add-row" id="ddMediaAddRow">
      <button class="media-add-btn" style="width:100%" onclick="openStickerPicker()">😊 스티커 추가</button>
    </div>
    <div class="dd-btns">
      <button class="btn btn-s" onclick="closeM('ddM')">닫기</button>
      <button class="btn btn-p" id="ddAddEvBtn" onclick="openEvFromDd()">+ 일정 추가</button>
    </div>
  </div>
</div>

<!-- ═══ STICKER PICKER ═══ -->
<div class="bso" id="stkM">
  <div class="bs">
    <div class="bs-h"></div>
    <div class="bs-t">스티커 선택</div>
    <div class="stk-grid" id="stkGrid"></div>
    <button class="btn btn-s" style="margin-top:14px;width:100%" onclick="closeM('stkM')">닫기</button>
  </div>
</div>

<!-- ═══ CATEGORY MGMT ═══ -->
<div class="bso" id="catM">
  <div class="bs">
    <div class="bs-h"></div>

</div><!-- #root -->
<script>
/* ═══════════════════════════════════════
   1.  CONSTANTS & STATE
═══════════════════════════════════════ */
const UK='shcal_u', EK='shcal_e', CK='shcal_c', MK='shcal_m', TK='shcal_t', SPK='shcal_sp', CVK='shcal_cv', GK='shcal_g';
const TOKEN_MS = 90*24*60*60*1000;

const STICKERS=['🌸','🌺','🌻','🌹','🌷','🍀','🌿','🍁','🌈','⭐','☀️','🌙','❄️','🌊',
  '❤️','💙','💚','💛','💜','🧡','💗','💝','😊','🥰','😍','😎','🤩','🥳',
  '🎉','🎊','🎁','🎀','🏆','🥇','🍕','🎂','🍰','🍦','☕','✈️','🏖️','🎵',
  '🎮','💪','📚','📸','🔥','💫','✨','💎','🌟','🎯','🚀'];

const COLORS=[
  {cls:'c-blue',  bg:'#90caf9',label:'파랑'},
  {cls:'c-red',   bg:'#ef9a9a',label:'빨강'},
  {cls:'c-green', bg:'#a5d6a7',label:'초록'},
  {cls:'c-yellow',bg:'#fff176',label:'노랑'},
  {cls:'c-purple',bg:'#ce93d8',label:'보라'},
  {cls:'c-orange',bg:'#ffcc80',label:'주황'},
  {cls:'c-teal',  bg:'#80cbc4',label:'청록'},
  {cls:'c-pink',  bg:'#f48fb1',label:'분홍'},
  {cls:'c-gray',  bg:'#e0e0e0',label:'회색'},
];
const CBG = Object.fromEntries(COLORS.map(c=>[c.cls,c.bg]));

const DEFAULT_CATS=[
  {id:'work',    name:'업무',  color:'c-blue',  order:0},
  {id:'personal',name:'개인',  color:'c-green', order:1},
  {id:'family',  name:'가족',  color:'c-orange',order:2},
  {id:'special', name:'기념일',color:'c-pink',  order:3},
  {id:'other',   name:'기타',  color:'c-gray',  order:4},
];

let CU=null, VY=0, VM=0;
let viewMode='month', wcCenterDate=null;
const WC_HOUR_H=36, WC_START=6, WC_END=22;
let editEvId=null, editUsId=null, editCatId=null, editGrpId=null;
let selCatColor='c-blue';
let ddDate=null;
let hiddenCats=new Set();
let hiddenScopes=new Set();
let grpSelMembers=new Set();
let splashPhoto=null; // temp storage during splash edit

/* ═══════════════════════════════════════
   2.  STORAGE — Firebase + localStorage fallback
   ─────────────────────────────────────
   Firebase 설정 방법:
   1. https://console.firebase.google.com → 새 프로젝트
   2. 빌드 → Realtime Database → 데이터베이스 만들기 (테스트 모드)
   3. 아래 FIREBASE_DB_URL 에 본인 URL 붙여넣기
      예) 'https://my-tennis-cal-default-rtdb.firebaseio.com'
   ─────────────────────────────────────  */
const FIREBASE_DB_URL = 'https://sul-co-cal-default-rtdb.asia-southeast1.firebasedatabase.app';

let _db = null;
(function(){
  try{
    if(FIREBASE_DB_URL.includes('YOUR-PROJECT')) return;
    firebase.initializeApp({databaseURL:FIREBASE_DB_URL});
    _db = firebase.database();
    console.log('Firebase _db ready');
  }catch(e){ console.warn('Firebase init failed:',e); _db=null; }
})();

// 인메모리 데이터 캐시
let _D = {users:[],events:[],cats:null,media:{},covers:{},groups:[],splash:null};
let _fbReady = false;

// Firebase converts JS arrays to {0:{...},1:{...}} objects — this converts them back
function fbArr(v){
  if(!v) return [];
  if(Array.isArray(v)) return v;
  if(typeof v==='object') return Object.keys(v).sort((a,b)=>Number(a)-Number(b)).map(k=>v[k]);
  return [];
}

async function loadAllData(){
  if(_db){
    await new Promise((resolve,reject)=>{
      // 10초 안에 응답 없으면 로컬 폴백
      const timeout=setTimeout(()=>{
        console.warn('Firebase timeout — falling back to localStorage');
        _db=null; reject();
      },10000);

      _db.ref('/cal').on('value', snap=>{
        clearTimeout(timeout);
        const d = snap.val()||{};
        // Firebase stores arrays as {0:{...},1:{...}} objects — convert back to arrays
        _D.users  = fbArr(d.users);
        _D.events = fbArr(d.events);
        _D.cats   = d.cats ? fbArr(d.cats) : null;
        // media: object of date→array
        const rawMedia = d.media||{};
        _D.media = {};
        Object.keys(rawMedia).forEach(ds=>{ _D.media[ds]=fbArr(rawMedia[ds]); });
        _D.covers = d.covers ?? {};
        _D.groups = fbArr(d.groups);
        _D.splash = d.splash ?? null;

        if(!_fbReady){
          _fbReady=true;
          console.log('Firebase data loaded ✓');
          resolve();
          return;
        }

        // 이후 변경 시 실시간 반영 ───────────────
        // 스플래시 화면 갱신
        const spEl=document.getElementById('splash');
        if(spEl && spEl.style.display!=='none'){
          const sp=getSplash();
          document.getElementById('spTitle').textContent=sp.title||'개인 캘린더';
          document.getElementById('spDesc').textContent=sp.desc||'';
          spEl.style.backgroundImage=sp.photo?`url(${sp.photo})`:'linear-gradient(135deg,#0f2027 0%,#203a43 50%,#2c5364 100%)';
        }
        // 캘린더 화면 갱신
        if(CU){
          const u=_D.users.find(x=>x.id===CU.id);
          if(!u){ doLogout(); return; }
          CU=u;
          renderCatBar(); renderScopeBar();
          if(viewMode==='week') renderWeek(); else renderCal();
          if(document.getElementById('ddM').classList.contains('open')) refreshDd();
          if(document.getElementById('evDM').classList.contains('open')&&detailEvId) openEvDetail(detailEvId);
        }
      });
    }).catch(()=>{
      // 타임아웃 → localStorage 폴백
      _loadFromLS();
    });
  } else {
    _loadFromLS();
  }
}
function _loadFromLS(){
  _D.users  = JSON.parse(localStorage.getItem(UK)||'[]');
  _D.events = JSON.parse(localStorage.getItem(EK)||'[]');
  _D.cats   = JSON.parse(localStorage.getItem(CK)||'null');
  _D.media  = JSON.parse(localStorage.getItem(MK)||'{}');
  _D.covers = JSON.parse(localStorage.getItem(CVK)||'{}');
  _D.groups = JSON.parse(localStorage.getItem(GK)||'[]');
  _D.splash = JSON.parse(localStorage.getItem(SPK)||'null');
}

function _save(key,val){
  _D[key]=val;
  if(_db){
    _db.ref('/cal/'+key).set(val).catch(e=>console.warn('Firebase write:',e));
  } else {
    const lsKey={users:UK,events:EK,cats:CK,media:MK,covers:CVK,groups:GK,splash:SPK}[key];
    if(lsKey){ try{ localStorage.setItem(lsKey,JSON.stringify(val)); }
      catch(e){ if(key==='media'||key==='splash') toast('저장 공간이 부족합니다.'); } }
  }
}

const getUsers  =()=> _D.users;
const getEvents =()=> _D.events;
const getCats   =()=> (_D.cats||DEFAULT_CATS).slice().sort((a,b)=>a.order-b.order);
const getMedia  =()=> _D.media||{};
const getCovers =()=> _D.covers||{};
const getGroups =()=> _D.groups||[];
const getSplash =()=> _D.splash||{title:'개인 캘린더',desc:'',photo:''};

const setUsers  =v=> _save('users',v);
const setEvents =v=> _save('events',v);
const setCats   =v=> _save('cats',v);
const setMedia  =v=> _save('media',v);
const setCovers =v=> _save('covers',v);
const setGroups =v=> _save('groups',v);
const setSplash =v=> _save('splash',v);

// 토큰은 디바이스별 localStorage (90일 자동로그인)
function getToken(){ return JSON.parse(localStorage.getItem(TK)||'null'); }
function setToken(userId){ localStorage.setItem(TK,JSON.stringify({userId,expires:Date.now()+TOKEN_MS})); }
function clearToken(){ localStorage.removeItem(TK); }

/* ═══════════════════════════════════════
   3.  INIT
═══════════════════════════════════════ */
async function init(){
  // 로딩 화면 표시
  const ldg=document.getElementById('ldg');
  ldg.style.display='flex';

  // Firebase (또는 localStorage) 에서 데이터 로드
  await loadAllData();

  ldg.style.display='none';

  // Firebase 연결 상태 알림
  if(_db && _fbReady){
    toast('☁️ 실시간 동기화 연결됨');
  } else {
    toast('⚠️ 오프라인 모드 (데이터가 이 기기에만 저장됩니다)');
  }

  // 기본 관리자 계정
  let users=getUsers();
  if(!users.find(u=>u.role==='admin')){
    users.push({id:'admin',username:'admin',password:'admin1234',name:'관리자',role:'admin'});
    setUsers(users);
  }
  // 기존 'guest' role → 'user' 마이그레이션
  if(users.some(u=>u.role==='guest')){
    users=users.map(u=>u.role==='guest'?{...u,role:'user'}:u);
    setUsers(users);
  }
  // 이벤트 구조 마이그레이션 (date/time → startDate/endDate, 새 필드 추가)
  {
    let evs=getEvents();
    let changed=false;
    evs=evs.map(e=>{
      if(!e.startDate){
        changed=true;
        return {...e,startDate:e.date,startTime:e.time||'',endDate:e.date,endTime:'',
          memo:'',attendees:[],chat:[],photos:[],coverPhotoId:null};
      }
      // 기존 신규 구조도 누락 필드 보정
      const fix={};
      if(!e.attendees) fix.attendees=[];
      if(!e.chat) fix.chat=[];
      if(!e.photos) fix.photos=[];
      if(Object.keys(fix).length){ changed=true; return {...e,...fix}; }
      return e;
    });
    if(changed) setEvents(evs);
  }
  // 기본 카테고리
  if(!_D.cats) setCats(DEFAULT_CATS);

  // 키보드 이벤트
  ['lu','lp'].forEach(id=>{
    document.getElementById(id).addEventListener('keydown',e=>{
      if(e.key==='Enter'){ id==='lu'?document.getElementById('lp').focus():doLogin(); }
    });
  });

  // 사진 입력 핸들러
  document.getElementById('photoIn').addEventListener('change',async e=>{
    const file=e.target.files[0]; if(!file) return;
    toast('사진을 처리 중...');
    const data=await compressImage(file);
    addMediaItem(ddDate,{type:'photo',data});
    e.target.value='';
    refreshDd();
    toast('사진이 추가되었습니다');
  });

  // 이벤트 사진 핸들러
  document.getElementById('evPhotoIn').addEventListener('change',async e=>{
    const file=e.target.files[0]; if(!file) return;
    toast('사진을 처리 중...');
    const data=await compressImage(file);
    addEvPhoto(data);
    e.target.value='';
  });

  // 스플래시 사진 핸들러
  document.getElementById('splashPhotoIn').addEventListener('change',async e=>{
    const file=e.target.files[0]; if(!file) return;
    toast('사진을 처리 중...');
    splashPhoto=await readImageAsDataURL(file);
    e.target.value='';
    document.getElementById('spPhotoLabel').textContent='사진 변경됨 ✓';
    updateSpPreview();
    toast('사진이 등록되었습니다');
  });

  // 모달 바깥 클릭 시 닫기
  document.querySelectorAll('.bso').forEach(el=>{
    el.addEventListener('click',function(e){ if(e.target===this) this.classList.remove('open'); });
  });

  // 스플래시 1.5초 → 로그인 여부 분기
  showSplash(()=>{
    const tok=getToken();
    if(tok && tok.expires>Date.now()){
      const u=getUsers().find(u=>u.id===tok.userId);
      if(u){ CU=u; hideSplashToApp(); return; }
      clearToken();
    }
    document.getElementById('spLogin').classList.add('show');
  });
}

/* ═══════════════════════════════════════
   6.  CALENDAR RENDER
═══════════════════════════════════════ */
const MNS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

function renderCal(){
  document.getElementById('hmonth').textContent=`${VY}년 ${MNS[VM]}`;
  const grid=document.getElementById('cgrid');
  grid.innerHTML='';
  const today=fd(new Date());
  const first=new Date(VY,VM,1);
  const last=new Date(VY,VM+1,0).getDate();
  const events=getEvents();
  const media=getMedia();
  const cats=getCats();

  const cells=[];
  for(let i=0;i<first.getDay();i++) cells.push({d:new Date(VY,VM,1-(first.getDay()-i)),other:true});
  for(let d=1;d<=last;d++) cells.push({d:new Date(VY,VM,d),other:false});
  while(cells.length%7!==0){ const l=cells[cells.length-1].d; cells.push({d:new Date(l.getTime()+86400000),other:true}); }

  for(let row=0;row<cells.length/7;row++){
    const rowCells=cells.slice(row*7,row*7+7);
    const rowStart=fd(rowCells[0].d), rowEnd=fd(rowCells[6].d);
    const weekDiv=document.createElement('div');
    weekDiv.className='cal-week';

    const mdEvs=events.filter(e=>{
      const sd=e.startDate||e.date, ed=e.endDate||e.date;
      if(sd>=ed) return false;
      return sd<=rowEnd&&ed>=rowStart&&!hiddenCats.has(e.categoryId)&&canSeeEvent(e);
    });
    if(mdEvs.length){
      const area=document.createElement('div');
      area.className='cal-md-area';
      const sorted=[...mdEvs].sort((a,b)=>{const as=a.startDate||a.date,bs=b.startDate||b.date;return as<bs?-1:as>bs?1:0;});
      const slotEnds=[];
      sorted.forEach(ev=>{
        const cat=cats.find(c=>c.id===ev.categoryId);
        const cls=cat?cat.color:(ev.color||'c-blue');
        const evS=(ev.startDate||ev.date)<rowStart?rowStart:(ev.startDate||ev.date);
        const evE=(ev.endDate||ev.date)>rowEnd?rowEnd:(ev.endDate||ev.date);
        let slot=slotEnds.findIndex(end=>end<evS);
        if(slot===-1) slot=slotEnds.length;
        slotEnds[slot]=evE;
        const cs=rowCells.findIndex(c=>fd(c.d)===evS);
        const ce=rowCells.findIndex(c=>fd(c.d)===evE);
        const colS=cs>=0?cs:0, colE=ce>=0?ce:6;
        const span=colE-colS+1;
        const isStart=(ev.startDate||ev.date)>=rowStart;
        const isEnd=(ev.endDate||ev.date)<=rowEnd;
        const bar=document.createElement('div');
        bar.className='cal-md-bar '+cls;
        let r='';
        if(!isStart) r+='border-top-left-radius:0;border-bottom-left-radius:0;';
        if(!isEnd) r+='border-top-right-radius:0;border-bottom-right-radius:0;';
        bar.style.cssText=`left:calc(${colS}/7*100%);width:calc(${span}/7*100% - 4px);top:${slot*22+2}px;`+r;
        bar.textContent=isStart?ev.title:'';
        bar.title=ev.title;
        bar.onclick=e=>{e.stopPropagation();openEvDetail(ev.id);};
        area.appendChild(bar);
      });
      area.style.height=`${slotEnds.length*22+6}px`;
      weekDiv.appendChild(area);
    }

    const daysDiv=document.createElement('div');
    daysDiv.className='cal-days';
    rowCells.forEach(cell=>{
      const ds=fd(cell.d), dow=cell.d.getDay();
      let evs=events.filter(e=>{
        const sd=e.startDate||e.date, ed=e.endDate||e.date;
        if(sd<ed) return false;
        return sd===ds&&!hiddenCats.has(e.categoryId)&&canSeeEvent(e);
      });
      evs=sortEvs(evs,cats);
      const m=media[ds]||[], stks=m.filter(x=>x.type==='sticker');
      const coverPhotos=[];
      for(const ev of events){
        const sd=ev.startDate||ev.date;
        if(sd===ds&&ev.coverPhotoId&&(ev.photos||[]).length){
          const cp=ev.photos.find(p=>p.id===ev.coverPhotoId);
          if(cp){coverPhotos.push(cp);if(coverPhotos.length>=2)break;}
        }
      }
      const div=document.createElement('div');
      const hasCover=coverPhotos.length>0, hasCover2=coverPhotos.length>=2;
      div.className='dc'+(cell.other?' other':'')+(dow===0?' sun':'')+(dow===6?' sat':'')+(ds===today?' today':'')
        +(hasCover2?' has-cover-2':hasCover?' has-cover':'');
      if(hasCover2){
        div.style.backgroundImage=`url(${coverPhotos[0].data}),url(${coverPhotos[1].data})`;
        div.style.backgroundSize='50% 100%,50% 100%';
        div.style.backgroundPosition='left center,right center';
        div.style.backgroundRepeat='no-repeat,no-repeat';
      } else if(hasCover){ div.style.backgroundImage=`url(${coverPhotos[0].data})`; }
      const dnRow=document.createElement('div');
      dnRow.className='dc-stk-row';
      if(stks[0]){const sl=document.createElement('span');sl.className='dc-stk';sl.textContent=stks[0].data;dnRow.appendChild(sl);}
      const dn=document.createElement('div');dn.className='dnum';dn.textContent=cell.d.getDate();
      dnRow.appendChild(dn);
      if(stks[1]){const sr=document.createElement('span');sr.className='dc-stk';sr.textContent=stks[1].data;dnRow.appendChild(sr);}
      div.appendChild(dnRow);
      evs.forEach(ev=>{
        const cat=cats.find(c=>c.id===ev.categoryId);
        const cls=cat?cat.color:(ev.color||'c-blue');
        const isGrp=(ev.scope||'all')!=='all';
        const attCnt=(ev.attendees||[]).length;
        const p=document.createElement('div');
        p.className='ep '+cls+(isGrp?' ep-grp':'');
        p.textContent=ev.title+(attCnt?' 👥'+attCnt:'');
        p.onclick=e=>{e.stopPropagation();openEvDetail(ev.id);};
        div.appendChild(p);
      });
      const photoCnt=evs.reduce((acc,ev)=>acc+(ev.photos||[]).length,0);
      if(photoCnt){
        const mr=document.createElement('div');mr.className='cmedia';
        const pb=document.createElement('span');pb.className='cm-photo';pb.textContent=`📷${photoCnt}`;
        mr.appendChild(pb);div.appendChild(mr);
      }
      div.onclick=()=>openDd(cell.d,ds);
      daysDiv.appendChild(div);
    });
    weekDiv.appendChild(daysDiv);
    grid.appendChild(weekDiv);
  }
}
function fd(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

function sortEvs(evs,cats){
  // 시작 시간 우선 정렬, 시간 없으면 카테고리 순
  return [...evs].sort((a,b)=>{
    const at=a.startTime||a.time||'', bt=b.startTime||b.time||'';
    if(at&&bt) return at>bt?1:-1;
    if(at&&!bt) return -1;
    if(!at&&bt) return 1;
    const ord=Object.fromEntries((cats||[]).map(c=>[c.id,c.order]));
    return (ord[a.categoryId]??99)-(ord[b.categoryId]??99);
  });
}

function changeMonth(d){
  if(viewMode==='week'){
    if(!wcCenterDate) wcCenterDate=new Date();
    wcCenterDate=new Date(wcCenterDate.getTime()+d*86400000);
    renderWeek(); _animCal('week',d); return;
  }
  VM+=d; if(VM<0){VM=11;VY--;} if(VM>11){VM=0;VY++;} renderCal(); _animCal('month',d);
}
function _animCal(v,d){
  const e=v==='month'?document.getElementById('cgrid'):document.getElementById('wcInner');
  if(!e)return;
  ['cal-anim-up','cal-anim-down','cal-anim-left','cal-anim-right'].forEach(c=>e.classList.remove(c));
  void e.offsetWidth;
  e.classList.add(v==='month'?(d>0?'cal-anim-up':'cal-anim-down'):(d>0?'cal-anim-left':'cal-anim-right'));
  setTimeout(()=>['cal-anim-up','cal-anim-down','cal-anim-left','cal-anim-right'].forEach(c=>e.classList.remove(c)),280);
}
function goToday(){
  if(viewMode==='week'){ wcCenterDate=new Date(); renderWeek(); _animCal('week',d); return; }
  const n=new Date(); VY=n.getFullYear(); VM=n.getMonth(); renderCal();
}

/* ═══════════════════════════════════════
   6b. WEEKLY CALENDAR
═══════════════════════════════════════ */
function switchView(mode){
  viewMode=mode;
  const calEl=document.querySelector('.cal');
  const wcEl=document.getElementById('wcalWrap');
  if(mode==='week'){
    calEl.style.display='none';

    if(!wcCenterDate) wcCenterDate=new Date();
    renderWeek();
  } else {
    calEl.style.display='';
    wcEl.style.display='none';
    renderCal();
  }
  document.getElementById('monthViewBtn').classList.toggle('active',mode==='month');
  document.getElementById('weekViewBtn').classList.toggle('active',mode==='week');
}

function renderWeek(){
  if(!wcCenterDate) wcCenterDate=new Date();
  const todayStr=fd(new Date());
  const DAY=['일','월','화','수','목','금','토'];

  // 3일 (center ±1)
  const days=[];
  for(let i=-1;i<=1;i++){
    const d=new Date(wcCenterDate); d.setDate(d.getDate()+i); days.push(d);
  }

  // 헤더 타이틀
  const f=days[0],l=days[2];
  document.getElementById('hmonth').textContent=
    `${f.getMonth()+1}/${f.getDate()} ~ ${l.getMonth()+1}/${l.getDate()}`;

  const events=getEvents(), cats=getCats();

  // ─── 요일 헤더 ───
  const hdr=document.getElementById('wcDayHdr');
  hdr.innerHTML='<div></div>'+days.map(d=>{
    const ds=fd(d), dow=d.getDay(), isT=ds===todayStr;
    const cls=dow===0?'wc-sun':dow===6?'wc-sat':'';
    return `<div class="wc-dh-cell ${cls}">
      <div class="wc-dh-name">${DAY[dow]}</div>
      <div class="wc-dh-date${isT?' wc-today':''}">${d.getDate()}</div>
    </div>`;
  }).join('');

  // ─── 종일 이벤트 바 ───
  const allday=document.getElementById('wcAlldayBar');
  const alldayEvs=events.filter(e=>{
    if(!canSeeEvent(e)||hiddenCats.has(e.categoryId)) return false;
    if(!e.startTime) return true;
    const _sd=e.startDate||e.date, _ed=e.endDate||e.date;
    return _ed>_sd;
  });
  if(alldayEvs.length){
    allday.style.display='grid';
    allday.innerHTML='<div class="wc-allday-lbl">종일</div>'+days.map(d=>{
      const ds=fd(d);
      const dayEvs=alldayEvs.filter(e=>{
        const sd=e.startDate||e.date, ed=e.endDate||e.date;
        return sd<=ds&&ds<=ed;
      });
      return `<div class="wc-allday-cell">${dayEvs.map(ev=>{
        const cat=cats.find(c=>c.id===ev.categoryId);
        const cls=cat?cat.color:'c-blue';
        return `<div class="wc-allday-ev ${cls}" onclick="openEvDetail('${ev.id}')" title="${ev.title}">${ev.title}</div>`;
      }).join('')}</div>`;
    }).join('');
  } else {
    allday.style.display='none';
  }

  // ─── 시간 그리드 ───
  const inner=document.getElementById('wcInner');
  const prevScroll=document.getElementById('wcScroll').scrollTop;
  let html='';
  for(let h=WC_START;h<=WC_END;h++){
    html+=`<div class="wc-time-label" style="height:${WC_HOUR_H}px">${h.toString().padStart(2,'0')}:00</div>`;
    days.forEach(d=>{
      const ds=fd(d), isT=ds===todayStr;
      html+=`<div class="wc-hour-cell${isT?' wc-today-col':''}" style="height:${WC_HOUR_H}px"></div>`;
    });
  }
  inner.innerHTML=html;

  // ─── 현재 시각 선 ───
  const now=new Date();
  const nowDs=fd(now);
  const nowDayIdx=days.findIndex(d=>fd(d)===nowDs);
  if(nowDayIdx>=0){
    const nowH=now.getHours(), nowM=now.getMinutes();
    if(nowH>=WC_START&&nowH<=WC_END){
      const nowLine=document.createElement('div');
      nowLine.className='wc-now-line';
      const topPx=(nowH-WC_START)*WC_HOUR_H+(nowM/60*WC_HOUR_H);
      nowLine.style.top=topPx+'px';
      inner.appendChild(nowLine);
    }
  }

  // ─── 이벤트 블록 배치 (layout 후) ───
  requestAnimationFrame(()=>{
    const totalW=inner.offsetWidth||380;
    const dayW=(totalW-40)/3;

    days.forEach((d,di)=>{
      const ds=fd(d);
      const dayTimedEvs=events.filter(ev=>{
        if(!canSeeEvent(ev)||hiddenCats.has(ev.categoryId)) return false;
        if(!ev.startTime) return false;
        const sd=ev.startDate||ev.date, ed=ev.endDate||ev.date;
        return sd<=ds&&ds<=ed;
      });
      _wcLayout(dayTimedEvs).forEach(({ev,col,totalCols})=>{
        const sh=parseInt(ev.startTime.slice(0,2))||0;
        const sm=parseInt(ev.startTime.slice(3,5))||0;
        const eh=ev.endTime?parseInt(ev.endTime.slice(0,2)):sh+1;
        const em=ev.endTime?parseInt(ev.endTime.slice(3,5)):0;
        if(sh>WC_END||eh<WC_START) return;
        const csh=Math.max(sh,WC_START), ceh=Math.min(eh,WC_END);
        const top=(csh-WC_START)*WC_HOUR_H+(sm/60*WC_HOUR_H);
        const durMin=Math.max((ceh-csh)*60-sm+em,15);
        const height=Math.max(durMin/60*WC_HOUR_H,22);
        const colW=dayW/totalCols;
        const left=40+di*dayW+col*colW+1;
        const width=colW-2;
        const cat=cats.find(c=>c.id===ev.categoryId);
        const cls=cat?cat.color:'c-blue';
        const attCnt=(ev.attendees||[]).length;
        const chatCnt=(ev.chat||[]).length;
        const attNames=_wcAttNames(ev);
        const memoSnip=ev.memo?ev.memo.slice(0,100)+(ev.memo.length>100?'…':''):'';
        const el=document.createElement('div');
        el.className='wc-ev '+cls;
        el.style.cssText=`top:${top}px;left:${left}px;width:${width}px;height:${height}px`;
        let inner2=`<div class="wc-ev-name">${ev.title}</div>`;
        if(height>24){
          const attStr=attCnt?(attNames?`👥${attCnt} (${attNames})`:`👥${attCnt}`):'';
          const chatStr=chatCnt?`💬${chatCnt}`:'';
          if(attStr||chatStr) inner2+=`<div class="wc-ev-meta">${[attStr,chatStr].filter(Boolean).join('　')}</div>`;
        }
        if(height>36&&memoSnip) inner2+=`<div class="wc-ev-meta">📝 ${memoSnip}</div>`;
        el.innerHTML=inner2;
        el.onclick=()=>openEvDetail(ev.id);
        document.getElementById('wcInner').appendChild(el);
      });
    });

    // 스크롤 복원 또는 기본 위치(08:00)
    const scrollEl=document.getElementById('wcScroll');
    if(scrollEl){
      scrollEl.scrollTop=prevScroll||Math.max(0,(8-WC_START)*WC_HOUR_H-40);
    }
  });
}

function _wcAttNames(ev){
  const users=getUsers();
  return (ev.attendees||[]).map(uid=>{
    const u=users.find(x=>x.id===uid); return u?u.name:null;
  }).filter(Boolean).join(', ');
}

/* ═══════════════════════════════════════
   7.  CATEGORY FILTER BAR
═══════════════════════════════════════ */
function renderCatBar(){
  const cats=getCats();
  const bar=document.getElementById('catBar');
  const allOn=hiddenCats.size===0;
  let h=`<div class="c-chip ${allOn?'active':''}" onclick="toggleAllCats()" style="${allOn?'background:#e3f2fd;border-color:#90caf9;color:#1565c0':''}">전체</div>`;
  cats.forEach(c=>{
    const bg=CBG[c.color]||'#90caf9';

let detailEvId=null;

function openEvDetail(evId){
  const ev=getEvents().find(e=>e.id===evId); if(!ev) return;
  detailEvId=evId;

  // 제목
  document.getElementById('evDTitle').textContent=ev.title;

  // 날짜/시간 포맷
  const fmtDT=(date,time)=>{
    if(!date) return '';
    const d=new Date(date+'T00:00');
    const DOW=['일','월','화','수','목','금','토'];
    const s=`${d.getMonth()+1}/${d.getDate()}(${DOW[d.getDay()]})`;
    return time?s+' '+time.slice(0,5):s;
  };
  const sd=ev.startDate||ev.date, ed=ev.endDate||ev.date;
  const st=ev.startTime||ev.time||'', et=ev.endTime||'';
  let dateLine='';
  if(sd===ed) dateLine=fmtDT(sd,st)+(et?' ~ '+et.slice(0,5):'');
  else dateLine=fmtDT(sd,st)+' ~ '+fmtDT(ed,et);
  document.getElementById('evDDates').textContent=dateLine;

  // 태그
  const cats=getCats();
  const cat=cats.find(c=>c.id===ev.categoryId);

    +`<span class="ev-tag ${sl.cls==='s-all'?'t-all':'t-grp'}">${sl.text}</span>`;

const _RE=['❤️','👍','😂','😮','😢','🎾'];
function _renderEvChat(ev){
  const area=document.getElementById('evDChatArea');
  const msgs=ev.chat||[];
  const users=getUsers();
  if(!msgs.length){ area.innerHTML='<div class="chat-empty">아직 메시지가 없습니다</div>'; return; }
  area.innerHTML=msgs.map(msg=>{
    const u=users.find(x=>x.id===msg.userId);
    const nick=u?u.name:(msg.userId==='__guest__'?'게스트':msg.userId);
    const isMine=msg.userId===CU.id;
    const canDel=isMine||(CU.role==='admin');
    const ts=new Date(msg.ts);
    const timeStr=ts.getHours().toString().padStart(2,'0')+':'+ts.getMinutes().toString().padStart(2,'0');
    const avHtml=u&&u.avatar
      ?`<div class="chat-avatar"><img src="${u.avatar}" alt=""></div>`
      :`<div class="chat-avatar">${nick.slice(0,1)}</div>`;
    const reacts=msg.reactions||{};
    const rb=Object.entries(reacts).filter(([,u])=>u.length>0).map(([e,u])=>`<button class="chat-react-btn${u.includes(CU.id)?' reacted':''}" onclick="toggleChatReaction('${msg.id}','${e}')">${e}<span class="react-cnt">${u.length}</span></button>`).join('');
    const db=canDel?`<button class="chat-del-btn" onclick="deleteChat('${msg.id}')" title="삭제">✕</button>`:'';
    return `<div class="chat-bubble${isMine?' chat-mine':''}" data-msgid="${msg.id}">
      <div class="chat-hd">${avHtml}<div class="chat-nick">${nick}</div>${db}</div>
      <div class="chat-text">${msg.text.replace(/</g,'&lt;')}</div>
      <div class="chat-ts">${timeStr}</div>
      <div class="chat-react-row">${rb}<button class="chat-react-add" onclick="showReactPicker('${msg.id}',this)">+ 반응</button></div>
    </div>`;
  }).join('');
  area.scrollTop=area.scrollHeight;
}
function deleteChat(msgId){
  if(!detailEvId)return;
  const evs=getEvents(),i=evs.findIndex(e=>e.id===detailEvId);if(i===-1)return;
  const msg=(evs[i].chat||[]).find(m=>m.id===msgId);if(!msg)return;
  if(msg.userId!==CU.id&&CU.role!=='admin'){toast('삭제 권한이 없습니다');return;}
  evs[i]={...evs[i],chat:(evs[i].chat||[]).filter(m=>m.id!==msgId)};
  setEvents(evs);_renderEvChat(evs[i]);toast('댓글이 삭제되었습니다 🗑');
}
function toggleChatReaction(msgId,emoji){
  if(!detailEvId)return;
  const evs=getEvents(),i=evs.findIndex(e=>e.id===detailEvId);if(i===-1)return;
  const chat=[...(evs[i].chat||[])],mi=chat.findIndex(m=>m.id===msgId);if(mi===-1)return;
  const reactions={...(chat[mi].reactions||{})},uids=[...(reactions[emoji]||[])],uidx=uids.indexOf(CU.id);
  if(uidx===-1)uids.push(CU.id);else uids.splice(uidx,1);
  if(uids.length===0)delete reactions[emoji];else reactions[emoji]=uids;
  chat[mi]={...chat[mi],reactions};evs[i]={...evs[i],chat};
  setEvents(evs);_renderEvChat(evs[i]);
}
function showReactPicker(msgId,btn){
  document.querySelectorAll('.chat-react-picker').forEach(p=>p.remove());
  const picker=document.createElement('div');picker.className='chat-react-picker';
  _RE.forEach(emoji=>{const b=document.createElement('button');b.textContent=emoji;b.onclick=(e)=>{e.stopPropagation();toggleChatReaction(msgId,emoji);picker.remove();};picker.appendChild(b);});
  btn.closest('.chat-react-row').appendChild(picker);
  setTimeout(()=>document.addEventListener('click',function _h(e){if(!picker.contains(e.target)){picker.remove();document.removeEventListener('click',_h);}}),30);
}

async function compressImage(file){
  return new Promise(res=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const MAX_H=800;
        const ratio=Math.min(MAX_H/img.height,1);
        const c=document.createElement('canvas');
        c.width=Math.round(img.width*ratio); c.height=Math.round(img.height*ratio);
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        res(c.toDataURL('image/jpeg',0.72));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// 고화질 압축 — 스플래시 배경용 (1920px 이하 유지, 품질 92%)
function readImageAsDataURL(file){
  return new Promise(res=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const MAX=1920;
        const ratio=Math.min(MAX/img.width, MAX/img.height, 1);
        const c=document.createElement('canvas');
        c.width=Math.round(img.width*ratio); c.height=Math.round(img.height*ratio);
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        res(c.toDataURL('image/jpeg',0.92));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

  const scope=document.getElementById('evScope').value||'all';
  if(!title){ toast('제목을 입력하세요'); return; }
  if(!startDate){ toast('시작 날짜를 선택하세요'); return; }
  const ed=endDate||startDate;
  if(ed<startDate){ toast('종료 날짜는 시작 날짜 이후여야 합니다'); return; }
  const evs=getEvents();
  if(editEvId){
    const i=evs.findIndex(e=>e.id===editEvId);
    if(i!==-1) evs[i]={...evs[i],title,startDate,startTime,endDate:ed,endTime,memo,categoryId,scope};
    toast('일정이 수정되었습니다');
  } else {
    evs.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,5),
      title,startDate,startTime,endDate:ed,endTime,memo,categoryId,scope,
      createdBy:CU.id,attendees:[],chat:[],photos:[],coverPhotoId:null});
    toast('일정이 추가되었습니다');
  }
  setEvents(evs); closeM('evM'); renderCal();
}
function delEvent(){
  if(!editEvId||!confirm('이 일정을 삭제할까요?')) return;
  setEvents(getEvents().filter(e=>e.id!==editEvId));
  closeM('evM'); renderCal(); toast('일정이 삭제되었습니다');
}

/* ═══════════════════════════════════════
   13.  SCOPE / GROUP HELPERS
═══════════════════════════════════════ */
function getMyGroups(){
  if(!CU || CU.role==='viewer') return [];
  const grps=getGroups();
  return CU.role==='admin' ? grps : grps.filter(g=>g.members.includes(CU.id));
}

function getScopeLabel(scope){
  if(!scope||scope==='all') return {text:'전체공유',cls:'s-all'};
  if(scope.startsWith('grp_')){
    const gid=scope.slice(4);
    const grp=getGroups().find(g=>g.id===gid);
    return grp ? {text:'👥 '+grp.name,cls:'s-grp'} : {text:'그룹',cls:'s-grp'};
  }
  return {text:'전체공유',cls:'s-all'};
}

// 뷰어가 아닌 로그인 사용자(승인됨/관리자)만 편집 가능
function canEdit(){ return CU && CU.role!=='viewer'; }

function canSeeEvent(ev){
  const scope=ev.scope||'all';
  // Check user access
  if(scope.startsWith('grp_')){
    const gid=scope.slice(4);
    const grp=getGroups().find(g=>g.id===gid);
    if(!grp) return false;
    if(CU.role!=='admin' && !grp.members.includes(CU.id)) return false;
  }
  // Check hidden filter
  return !hiddenScopes.has(scope);
}

function renderScopeBar(){
  const myGrps=getMyGroups();
  const bar=document.getElementById('scopeBar');
  if(!myGrps.length){ bar.style.display='none'; return; }
  bar.style.display='flex';
  const allOn=!hiddenScopes.has('all');
  let h=`<span class="scope-label">공유</span>`;
  h+=`<div class="sc-chip ${allOn?'on-all':''}" onclick="toggleScope('all')">`;
  if(allOn) h+=`<div class="sc-dot" style="background:#66bb6a"></div>`;
  h+=`전체공유</div>`;
  myGrps.forEach(g=>{
    const sk='grp_'+g.id;
    const on=!hiddenScopes.has(sk);
    h+=`<div class="sc-chip ${on?'on-grp':''}" onclick="toggleScope('${sk}')">`;
    if(on) h+=`<div class="sc-dot" style="background:#ffa726"></div>`;
    h+=`${g.name}</div>`;
  });
  bar.innerHTML=h;
}

function toggleScope(sk){
  if(hiddenScopes.has(sk)) hiddenScopes.delete(sk); else hiddenScopes.add(sk);
  renderScopeBar(); if(viewMode==='week') renderWeek(); else renderCal();
}

/* ═══════════════════════════════════════

function openGroupMgmt(){ renderGroupList(); openM('grpM'); }

function renderGroupList(){

function openGrpEdit(gid){

}

function renderMemList(){
  const users=getUsers();
  document.getElementById('memList').innerHTML=users.map(u=>{
    const on=grpSelMembers.has(u.id);
    return `<div class="mem-item" onclick="toggleMem('${u.id}')">
      <div class="mem-chk ${on?'on':''}">${on?'✓':''}</div>

        <div class="mem-id">@${u.username}</div>
      </div>

function toggleMem(uid){
  if(grpSelMembers.has(uid)) grpSelMembers.delete(uid); else grpSelMembers.add(uid);
  renderMemList();
}

function saveGroup(){
  const name=document.getElementById('grpEName').value.trim();
  const err=document.getElementById('grpErr');
  if(!name){err.textContent='그룹 이름을 입력하세요';return;}
  if(grpSelMembers.size===0){err.textContent='멤버를 한 명 이상 선택해 주세요';return;}
  const grps=getGroups();
  if(editGrpId){
    const i=grps.findIndex(g=>g.id===editGrpId); if(i===-1) return;
    grps[i]={...grps[i],name,members:[...grpSelMembers]};
    toast('그룹이 수정되었습니다');
  } else {
    grps.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,4),
      name,members:[...grpSelMembers],createdBy:CU.id,createdAt:Date.now()});
    toast('그룹이 생성되었습니다 👥');
  }
  setGroups(grps);
  closeM('grpEM');
  renderGroupList();
  renderScopeBar();
  // Repopulate evScope if event modal is open
  const myGrps=getMyGroups();
  document.getElementById('evScope').innerHTML=
    `<option value="all">📢 전체 공유</option>`+
    myGrps.map(g=>`<option value="grp_${g.id}">👥 ${g.name}</option>`).join('');
}

function delGroup(){
  if(!editGrpId||!confirm('이 그룹을 삭제할까요?\n그룹 전용 일정도 모두 삭제됩니다.')) return;
  const sk='grp_'+editGrpId;
  setEvents(getEvents().filter(e=>(e.scope||'all')!==sk));
  setGroups(getGroups().filter(g=>g.id!==editGrpId));
  hiddenScopes.delete(sk);
  closeM('grpEM');
  renderGroupList();
  renderScopeBar();
  renderCal();
  toast('그룹이 삭제되었습니다');
}

/* ═══════════════════════════════════════
   14.  CATEGORY MANAGEMENT
═══════════════════════════════════════ */
function openCatMgmt(){ renderCatList(); openM('catM'); }

function renderCatList(){
  const cats=getCats();
  document.getElementById('catList').innerHTML=cats.map((c,i)=>{
    const bg=CBG[c.color]||'#ccc';
    return `<div class="cat-item">
      <div class="cat-swatch" style="background:${bg}"></div>
      <div class="cat-name">${c.name}</div>
      <div class="cat-order-btns">
        ${i>0?`<button class="order-btn" onclick="moveCat('${c.id}',-1)">↑</button>`:'<div style="width:26px"></div>'}
        ${i<cats.length-1?`<button class="order-btn" onclick="moveCat('${c.id}',1)">↓</button>`:'<div style="width:26px"></div>'}
      </div>
      <button class="cat-edit-btn" onclick="openCatEdit('${c.id}')">✏️</button>
    </div>`;
  }).join('');
}

function moveCat(id,dir){
  const cats=getCats();
  const i=cats.findIndex(c=>c.id===id); if(i===-1) return;
  const ni=i+dir; if(ni<0||ni>=cats.length) return;
  // Swap orders
  const tmp=cats[i].order; cats[i].order=cats[ni].order; cats[ni].order=tmp;
  setCats(cats); renderCatList(); renderCatBar(); renderCal();
}

function openCatEdit(id){
  editCatId=id;
  // Build color picker
  document.getElementById('catCPick').innerHTML=COLORS.map(c=>
    `<div class="copt" data-cc="${c.cls}" style="background:${c.bg}" onclick="pickCatColor('${c.cls}',this)" title="${c.label}"></div>`
  ).join('');
  document.getElementById('catErr').textContent='';

  if(id){
    const cat=getCats().find(c=>c.id===id);
    if(!cat) return;
    document.getElementById('catEMT').textContent='카테고리 수정';
    document.getElementById('catEName').value=cat.name;
    selCatColor=cat.color;
    document.getElementById('catEDel').style.display='inline-block';
  } else {
    document.getElementById('catEMT').textContent='카테고리 추가';
    document.getElementById('catEName').value='';
    selCatColor='c-blue';
    document.getElementById('catEDel').style.display='none';
  }
  // Mark selected color
  setTimeout(()=>{
    const t=document.querySelector(`#catCPick .copt[data-cc="${selCatColor}"]`);
    if(t) t.classList.add('sel');
  },10);
  openM('catEM');
}
function pickCatColor(cls,el){
  selCatColor=cls;
  document.querySelectorAll('#catCPick .copt').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');
}
function saveCat(){
  const name=document.getElementById('catEName').value.trim();
  const err=document.getElementById('catErr');
  if(!name){ err.textContent='이름을 입력하세요'; return; }
  const cats=getCats();
  if(editCatId){
    const i=cats.findIndex(c=>c.id===editCatId); if(i===-1) return;
    cats[i]={...cats[i],name,color:selCatColor};
    toast('카테고리가 수정되었습니다');
  } else {
    const maxOrd=cats.reduce((m,c)=>Math.max(m,c.order),0);
    cats.push({id:Date.now().toString(36),name,color:selCatColor,order:maxOrd+1});
    toast('카테고리가 추가되었습니다');
  }
  setCats(cats); closeM('catEM'); renderCatList(); renderCatBar(); renderCal();
}
function delCat(){
  if(!editCatId||!confirm('이 카테고리를 삭제할까요?')) return;
  setCats(getCats().filter(c=>c.id!==editCatId));
  closeM('catEM'); renderCatList(); renderCatBar(); renderCal();
  toast('카테고리가 삭제되었습니다');
}

   14b.  PROFILE

/* ── linkify: URL → 클릭 가능 링크 ── */
function linkify(text){
  const safe=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return safe.replace(/(https?:\/\/[^\s<>"']+)/g,
    '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
}

/* ── 프로필 사진 처리 ── */
function handleProfPhoto(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const size=200;
      const c=document.createElement('canvas');
      c.width=size; c.height=size;
      const ctx=c.getContext('2d');
      const minSide=Math.min(img.width,img.height);
      const sx=(img.width-minSide)/2, sy=(img.height-minSide)/2;
      ctx.drawImage(img,sx,sy,minSide,minSide,0,0,size,size);
      const dataUrl=c.toDataURL('image/jpeg',0.85);
      const imgEl=document.getElementById('profAvatarImg');
      imgEl.src=dataUrl; imgEl.style.display='block';
      document.getElementById('profAvatarIcon').style.display='none';
      window._profPhotoData=dataUrl;
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function openProfile(){
  if(!CU||CU.role==='viewer') return;
  document.getElementById('profIdDisp').value=CU.username||CU.id;
  document.getElementById('profName').value=CU.name||'';
  document.getElementById('profPw').value='';
  document.getElementById('profErr').textContent='';
  window._profPhotoData=null;
  const imgEl=document.getElementById('profAvatarImg');
  if(CU.avatar){ imgEl.src=CU.avatar; imgEl.style.display='block'; document.getElementById('profAvatarIcon').style.display='none'; }
  else { imgEl.style.display='none'; document.getElementById('profAvatarIcon').style.display='block'; }
  openM('profM');
}
function saveProfile(){
  const name=document.getElementById('profName').value.trim();
  const pw=document.getElementById('profPw').value;
  const err=document.getElementById('profErr');
  if(!name){err.textContent='닉네임을 입력하세요';return;}
  const users=getUsers();
  const i=users.findIndex(u=>u.id===CU.id);
  if(i===-1){err.textContent='사용자 정보를 찾을 수 없습니다';return;}
  const updated={...users[i],name};
  if(pw) updated.password=pw;
  if(window._profPhotoData) updated.avatar=window._profPhotoData;
  users[i]=updated;
  setUsers(users);
  CU=updated;
  document.getElementById('dname').textContent=CU.name;
  closeM('profM');
  toast('프로필이 저장되었습니다 ✓');
}

/* ═══════════════════════════════════════
   14c.  SWIPE GESTURES
═══════════════════════════════════════ */
function _doRefresh(){
  if(!_db){
    renderCatBar(); renderScopeBar();
    if(viewMode==='week') renderWeek(); else renderCal();
    toast('새로고침됨');
    return;
  }
  toast('새로고침 중...');
  _db.ref('/cal').once('value').then(snap=>{
    const d=snap.val()||{};
    _D.users=fbArr(d.users); _D.events=fbArr(d.events);
    _D.cats=d.cats?fbArr(d.cats):null;
    const rawMedia=d.media||{}; _D.media={};
    Object.keys(rawMedia).forEach(ds2=>{ _D.media[ds2]=fbArr(rawMedia[ds2]); });
    _D.covers=d.covers??{}; _D.groups=fbArr(d.groups); _D.splash=d.splash??null;
    renderCatBar(); renderScopeBar();
    if(viewMode==='week') renderWeek(); else renderCal();
    toast('✓ 새로고침 완료');
  }).catch(()=>{
    if(viewMode==='week') renderWeek(); else renderCal();
    toast('새로고침됨');
  });
}

function initSwipeGestures(){
  // 월간 캘린더: 좌우 스와이프 → 월 이동 / 아래↓ 스와이프 → 새로고침
  const calEl=document.querySelector('.cal');
  let cty=0, ctx2=0;
  calEl.addEventListener('touchstart',e=>{
    cty=e.touches[0].clientY; ctx2=e.touches[0].clientX;
  },{passive:true});
  calEl.addEventListener('touchend',e=>{
    const dy=e.changedTouches[0].clientY-cty;
    const dx=e.changedTouches[0].clientX-ctx2;
    if(Math.abs(dx)>55&&Math.abs(dx)>Math.abs(dy)){ changeMonth(dx<0?1:-1); return; }
    if(dy>80&&Math.abs(dy)>Math.abs(dx)){ _doRefresh(); }
  },{passive:true});

  // 주간 캘린더: 좌우 스와이프 → 날짜 이동 / 아래↓ 스와이프 → 새로고침
  const wcEl=document.getElementById('wcalWrap');
  let wsx=0, wsy=0;
  wcEl.addEventListener('touchstart',e=>{
    wsx=e.touches[0].clientX; wsy=e.touches[0].clientY;
  },{passive:true});
  wcEl.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-wsx;
    const dy=e.changedTouches[0].clientY-wsy;
    if(Math.abs(dx)>55&&Math.abs(dx)>Math.abs(dy)){ changeMonth(dx<0?1:-1); return; }
    if(dy>80&&Math.abs(dy)>Math.abs(dx)){ _doRefresh(); }
  },{passive:true});
}

let _tt;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),2500);
}
